version: "3"
services:
  hub:
    platform: linux/amd64
    build:
      context: ./
      dockerfile: Dockerfile.hub
    image: fhircast/hub
    ports:
      - "5000:80"
  client:
    platform: linux/amd64
    build:
      context: ./
      dockerfile: Dockerfile.client
    image: fhircast/client
    ports:
      - "5001:80"
